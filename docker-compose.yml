version: '3.8'

services:
  # PostgreSQL with pgvector extension for vector embeddings
  postgres-pgvector:
    image: pgvector/pgvector:pg16
    container_name: ai-ecommerce-pgvector
    environment:
      POSTGRES_DB: ai_ecommerce
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LiteLLM proxy for routing to multiple LLM providers via one OpenAI-compatible endpoint
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: ai-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    environment:
      # LiteLLM proxy auth key (the app uses this key as API key when profile=litellm)
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-dev}
      # Upstream provider keys
      OPEN_API_KEY: ${OPEN_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      DATABASE_URL: ${DATABASE_URL}
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    networks:
      - ai-network

volumes:
  pgvector_data:
    driver: local

networks:
  ai-network:
    driver: bridge
