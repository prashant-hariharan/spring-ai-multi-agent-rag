# In application.yml
---
spring:
  application:
    name: ai-chat-bot
  ai:
    openai:
      api-key: ${OPEN_API_KEY}
      embedding:
        options:
          model: text-embedding-3-small
      chat:
        enabled: true
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 500
    providers:
      gemini:
        api-key: ${GEMINI_API_KEY}
        model: gemini-2.5-flash
        temperature: 0.7
        max-tokens: 750
        base-url: https://generativelanguage.googleapis.com/v1beta
        completion-path: /openai/chat/completions
      groq:
        api-key: ${GROQ_API_KEY:}
        model: llama-3.1-8b-instant
        temperature: 0.7
        max-tokens: 500
        base-url: https://api.groq.com/openai/v1
        completion-path: /chat/completions
      ollama:
        api-key: ${OLLAMA_API_KEY:}
        model: llama3.2:3b
        temperature: 0.7
        max-tokens: 500
        base-url: http://localhost:11434/v1
        completion-path: /chat/completions


app:
  ai:
    llm-timeout-seconds: 120
    llm-logging:
      enabled: false
    guardrails:
      enabled: true
  rag:
    retrieval:
      default-top-k: 3
      combined-top-k: 5
      similarity-threshold: 0.60
  cache:
    intent:
      ttl-minutes: 30
      max-size: 5000
    order-read:
      ttl-seconds: 60
      max-size: 10000
    order-llm:
      ttl-seconds: 45
      max-size: 5000
    rag-answer:
      ttl-seconds: 120
      max-size: 5000
    rag-context:
      ttl-seconds: 120
      max-size: 5000
